<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<nav class="nav">
  <span class="nav-brand">🌸 JLPT N2 一本通</span>
  <a href="index.html">🏠 首页</a>
  <a href="grammar.html">📝 语法</a>

<div class="container">

<div class="hero" style="background:linear-gradient(135deg,#10B981 0%,#FBBF24 100%);">
  <span class="emoji">✅</span>
  <h1>每日打卡</h1>
  <p>坚持是最强武器 · 进度可视化</p>
</div>

<div class="card">
  <h3>📅 今日任务</h3>
  <div id="today-tasks"></div>
  <div style="margin-top:14px"><span class="badge badge-green">完成度</span></div>
  <div class="progress-bar" style="margin-top:6px"><div class="progress-fill" id="today-progress" style="width:0%"></div></div>
</div>

<div class="card">
  <h3>🔥 连续打卡</h3>
  <p style="font-size:48px;text-align:center;margin:12px 0;">
    <span id="streak-days" style="color:#F43F5E;font-weight:700">0</span> <span style="font-size:18px;color:#9CA3AF">天</span>
  </p>
  <p style="text-align:center;color:#6B7280">📈 累计完成任务数：<b id="total-done">0</b></p>
  <button class="btn" id="checkin-btn">🌱 今日打卡</button>
  <button class="btn btn-secondary btn-sm" id="reset-btn" style="margin-left:8px">🔄 重置进度</button>
</div>

<div class="card">
  <h3>📊 本周进度</h3>
  <div id="week-grid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:12px"></div>
</div>

</div>
<footer class="footer">🌸 JLPT N2 一本通 · Made with ❤️ for 中国学习者 · 2026</footer>
<script src="assets/app.js"></script>
</body></html>
